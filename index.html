<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Readly</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Libre+Caslon+Display&family=Playfair:ital,opsz,wght@0,5..1200,300..900;1,5..1200,300..900&display=swap");
      @import url("https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300..700;1,300..700&family=Libre+Caslon+Display&family=Playfair:ital,opsz,wght@0,5..1200,300..900;1,5..1200,300..900&display=swap");
    </style>
  </head>
  <body>
    <!--font 1 Playfair-->
    <!--logo-->
    <!--font 2 Cormorant_Garamond-->
    <!--content-->
    <header class="h-[72px] bg-[#ECE0DC]">
      <nav class="flex h-full items-center justify-between px-8">
        <div>
          <p class="font-['Playfair'] text-4xl font-medium">
            Read<span class="text-[#9D6B58]">ly</span>
          </p>
        </div>

        <div class="flex items-center w-full max-w-xl mx-8">
          <div class="relative flex w-full items-center">
            <div class="relative group">
              <select
                class="h-[46px] bg-[#f8f5f4] border border-gray-300 border-r-0 rounded-l-lg pl-4 pr-10 text-sm text-gray-700 outline-none appearance-none cursor-pointer hover:bg-white transition-colors focus:ring-1 focus:ring-[#9D6B58]"
              >
                <option>All Categories</option>
                <option>Romance</option>
                <option>History</option>
                <option>Self-Help</option>
                <option>Children</option>
                <option>Science fiction & Fantasy</option>
              </select>
              <div
                class="absolute inset-y-0 right-3 flex items-center pointer-events-none"
              >
                <svg
                  class="w-4 h-4 text-[#9D6B58]"
                  fill="none"
                  stroke="currentColor"
                  viewBox="0 0 24 24"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M19 9l-7 7-7-7"
                  ></path>
                </svg>
              </div>
            </div>

            <div class="relative w-full h-[46px]">
              <div
                class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none"
              >
                <svg
                  class="w-4 h-4 text-gray-400"
                  fill="none"
                  stroke="currentColor"
                  viewBox="0 0 24 24"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="m19 19-4-4m0-7A7 7 0 1 1 1 8a7 7 0 0 1 14 0Z"
                  />
                </svg>
              </div>
              <input
                type="search"
                class="block w-full h-full pl-10 pr-24 text-sm text-gray-900 border border-gray-300 rounded-r-lg bg-gray-50 focus:ring-[#9D6B58] focus:border-[#9D6B58] outline-none transition-all"
                placeholder="Search your favorite book..."
                required
              />
              <button
                type="submit"
                class="absolute right-1.5 top-1/2 -translate-y-1/2 bg-[#9D6B58] hover:bg-[#68483d] text-white font-bold rounded-md text-sm px-4 py-1.5 transition-colors"
              >
                Search
              </button>
            </div>
          </div>
        </div>

        <div class="flex items-center gap-6">
          <a
            href="#"
            class="flex items-center justify-center hover:opacity-80 transition-opacity"
          >
            <img
              src="./tar-image/heart.png"
              alt="wishlist"
              class="h-6 w-6 object-contain"
            />
          </a>
          <a
            href="#"
            class="flex items-center justify-center hover:opacity-80 transition-opacity"
          >
            <img
              src="./tar-image/shopping-cart.png"
              alt="shopping cart"
              class="h-6 w-6 object-contain"
            />
          </a>

          <a
            href="#"
            class="flex items-center justify-center hover:opacity-80 transition-opacity"
          >
            <img
              src="./tar-image/login.png"
              alt="login"
              class="h-7 w-7 object-contain"
            />
          </a>
        </div>
      </nav>
    </header>
    <hr class="border-[#68483d] border-1" />
    <main>
      <section class="h-[500px] bg-[#ECE0DC]" classname="hero-banner">
        <!--Ploy-->
      </section>

      <section class="h-[500px] bg-white" classname="today-deal">
        <!--Chong-->
      </section>

      <section class="h-[500px] bg-[#ECE0DC]" classname="category">
        <!--Jay & Em-->
      </section>
    </main>

    <footer class="h-[] bg-[#68483d]">
      <!--Nike-->
    </footer>
  </body>
</html>
